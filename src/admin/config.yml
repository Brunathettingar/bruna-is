        fields:
          - { label: Layout, name: layout, widget: hidden, default: "layouts/page.njk" }
          - { label: Title, name: title, widget: string }
          - { label: Description (meta), name: description, widget: text }
          - { label: Body class, name: bodyClass, widget: hidden, default: "about-page" }
          - label: 11ty navigation
            name: eleventyNavigation
            widget: object
            fields:
              - { label: Key, name: key, widget: hidden, default: "about-en" }
              - { label: Order, name: order, widget: number, value_type: int, default: 5 }
          - { label: Hero image, name: heroImage, widget: image }
          - { label: Kicker, name: kicker, widget: text }
          - label: Story
            name: story
            widget: object
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Heading (HTML), name: heading, widget: string }
              - label: Paragraphs
                name: paragraphs
                widget: list
                field: { label: Paragraph, name: p, widget: text }
              - { label: Quote (HTML), name: signatureQuote, widget: text }
              - { label: Quote attribution, name: signatureAttribution, widget: string }
              - { label: Timeline heading, name: timelineHeading, widget: string }
          - label: Philosophy
            name: philosophy
            widget: object
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Heading, name: heading, widget: string }
              - { label: Lead, name: lead, widget: text }
          - label: Team
            name: team
            widget: object
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Heading, name: heading, widget: string }
              - label: Extra tile
                name: extraTile
                widget: object
                fields:
                  - { label: Initials, name: initials, widget: string }
                  - { label: Name, name: name, widget: string }
                  - { label: Role, name: role, widget: string }
                  - { label: Bio, name: bio, widget: text }
          - label: CTA band
            name: cta
            widget: object
            fields:
              - { label: Heading (HTML), name: heading, widget: string }
              - { label: Primary href, name: primaryHref, widget: string }
              - { label: Primary label, name: primaryLabel, widget: string }
              - { label: Secondary href, name: secondaryHref, widget: string }
              - { label: Secondary label, name: secondaryLabel, widget: string }
